name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# quic-zig tracks the project toolchain via mise.toml, so CI uses
# jdx/mise-action to install the same Zig and helper tools as local
# development. boringssl-zig is a URL+hash dep, so Zig fetches it
# itself during build.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v4

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

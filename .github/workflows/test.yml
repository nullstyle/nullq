name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# nullq pins Zig 0.16.0 via mise (mise.toml). The official Zig
# downloads index doesn't list 0.16.0 — it's installed from mise's
# registry — so we use jdx/mise-action to install the same toolchain
# CI as local. boringssl-zig is a URL+hash dep, so Zig fetches it
# itself during build.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout nullq
        uses: actions/checkout@v4

      - name: Set up mise (zig 0.16.0 + project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

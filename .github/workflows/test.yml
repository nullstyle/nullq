name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# nullq pins boringssl-zig as a URL+hash dep in build.zig.zon, so
# Zig fetches the package itself during build. CI just needs Zig
# and network access — no sibling checkout required.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout nullq
        uses: actions/checkout@v4

      - name: Set up Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

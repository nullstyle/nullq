name: interop

on:
  schedule:
    # Sunday 06:00 UTC. Interop is environment-sensitive and slow,
    # so we run it weekly rather than on every push.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      tests:
        description: "QNS test letters (comma-separated)"
        required: false
        default: "H,DC,M"
      clients:
        description: "Client matrix"
        required: false
        default: "quic-go,quiche,ngtcp2"

# Interop runs are intentionally tolerant: a regression here is a
# signal to investigate, not a hard merge gate. The test workflow
# (test.yml) is the actual CI gate.
jobs:
  qns-server:
    name: QNS interop (quic-zig as server)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 90
    env:
      QUIC_ZIG_IMAGE: quic-zig-qns:local
      TESTS: ${{ github.event.inputs.tests || 'H,DC,M' }}
      CLIENTS: ${{ github.event.inputs.clients || 'quic-go,quiche,ngtcp2' }}
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v4
        with:
          path: quic-zig

      - name: Checkout quic-zig-qns
        uses: actions/checkout@v4
        with:
          repository: nullstyle/quic-zig-qns
          ref: main
          path: quic-zig-qns

      - name: Checkout quic-interop-runner
        uses: actions/checkout@v4
        with:
          repository: quic-interop/quic-interop-runner
          ref: master
          path: quic-interop-runner

      - name: Set up mise (zig 0.16.0, python 3.12, uv, just)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
          working_directory: quic-zig

      - name: Install runner deps
        working-directory: quic-interop-runner
        run: pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build quic-zig-qns image
        working-directory: quic-zig-qns
        env:
          QUIC_ZIG_DIR: ${{ github.workspace }}/quic-zig
        run: |
          # `make build-local` archives quic-zig and feeds it in as a
          # Docker build context (see quic-zig-qns/Makefile and
          # Dockerfile.local). Zig fetches boringssl-zig from the
          # URL+hash pin in quic-zig's build.zig.zon during the
          # in-Docker build. LOCALTAG=local matches QUIC_ZIG_IMAGE.
          make build-local LOCALTAG=local

      - name: Run QNS interop (server role)
        working-directory: quic-zig
        env:
          RUNNER_DIR: ${{ github.workspace }}/quic-interop-runner
        run: |
          zig build external-interop -- runner \
            --role server \
            --runner-dir "${RUNNER_DIR}" \
            --image "${QUIC_ZIG_IMAGE}" \
            --clients "${CLIENTS}" \
            --tests "${TESTS}" \
            --log-dir "${{ github.workspace }}/interop-logs" \
            --json "${{ github.workspace }}/interop-logs/result.json"

      - name: Upload interop logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-logs-${{ github.run_id }}
          path: |
            interop-logs/**
          if-no-files-found: warn
          retention-days: 14
